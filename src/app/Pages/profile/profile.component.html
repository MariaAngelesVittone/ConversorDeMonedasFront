<section class="profile">
  <h1>Mi perfil</h1>

  @if (loading) {
    <p>Cargando...</p>
  } @else if (!profile) {
    <p class="error">No se pudo cargar el perfil.</p>
  } @else {
    <div class="user-info">
      <p><strong>Usuario:</strong> {{ profile.username }}</p>
      <p><strong>Email:</strong> {{ profile.email }}</p>
    </div>

    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <h2>Suscripción</h2>
    <p class="hint">Podés cambiar de plan cuando quieras.</p>

    <app-subscription-plans
      [currentType]="profile.subscriptionType"
      (changed)="onPlanChanged($event)"
    ></app-subscription-plans>
  }
</section>
