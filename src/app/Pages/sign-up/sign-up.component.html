<section class="form-card">
  <h1>Crear cuenta</h1>

  <form (ngSubmit)="onSubmit()" #signUpForm="ngForm">
    <label>
      Usuario
      <input type="text" name="username" [(ngModel)]="signUpData.username" required />
    </label>

    <label>
      Email
      <input type="email" name="email" [(ngModel)]="signUpData.email" required />
    </label>

    <label>
      Contraseña
      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="signUpData.password"
          required
          minlength="6"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
          [title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          @if (showPassword) {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7-10-7-10-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l18 18"></path>
              <path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6.2 0 10 7 10 7a17.3 17.3 0 0 1-3.4 4.3M6.5 6.6C3.7 8.4 2 12 2 12s3.8 7 10 7c1.4 0 2.6-.3 3.7-.8"></path>
              <path d="M9.9 10a3 3 0 0 0 4.2 4.2"></path>
            </svg>
          }
        </button>
      </div>
    </label>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <button type="submit" [disabled]="signUpForm.invalid || loading">
      {{ loading ? 'Creando...' : 'Crear cuenta' }}
    </button>
  </form>

  <p class="switch">
    ¿Ya tenés cuenta? <a routerLink="/login">Ingresá</a>
  </p>
</section>
