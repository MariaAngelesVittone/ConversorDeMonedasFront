<section class="form-card">
  <h1>Crear cuenta</h1>

  <form (ngSubmit)="onSubmit()" #signUpForm="ngForm">
    <label>
      Usuario
      <input type="text" name="username" [(ngModel)]="signUpData.username" required />
    </label>

    <label>
      Email
      <input type="email" name="email" [(ngModel)]="signUpData.email" required />
    </label>

    <label>
      Contraseña
      <div class="password-field">
        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="signUpData.password"
          required
          minlength="6"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
          [title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          {{ showPassword ? '🙈' : '👁' }}
        </button>
      </div>
    </label>

    @if (errorMessage) {
      <p class="error">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p class="success">{{ successMessage }}</p>
    }

    <button type="submit" [disabled]="signUpForm.invalid || loading">
      {{ loading ? 'Creando...' : 'Crear cuenta' }}
    </button>
  </form>

  <p class="switch">
    ¿Ya tenés cuenta? <a routerLink="/login">Ingresá</a>
  </p>
</section>
