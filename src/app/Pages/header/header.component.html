<header class="header">
  <a class="brand" routerLink="/home">Conversor de Monedas</a>

  <nav class="nav">
    @if (authService.isLoggedIn) {
      <a routerLink="/converter">Convertir</a>
      <a routerLink="/currencies">Monedas</a>
      <a routerLink="/conversion-history">Historial</a>
      @if (authService.isAdmin) {
        <a routerLink="/admin">Admin</a>
      }
      <a class="user" routerLink="/profile">{{ authService.username }}</a>
      <button type="button" (click)="requestLogout()">Salir</button>
    } @else {
      <a routerLink="/login">Ingresar</a>
      <a routerLink="/sign-up">Registrarme</a>
    }
  </nav>

  @if (confirmingLogout) {
    <app-confirm-dialog
      message="¿Seguro que querés salir?"
      confirmLabel="Salir"
      (confirmed)="confirmLogout()"
      (cancelled)="cancelLogout()"
    ></app-confirm-dialog>
  }
</header>
